services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: doclens_db
    restart: always
    environment:
      - POSTGRES_USER=comet
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=doclens
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./postgres_init:/docker-entrypoint-initdb.d

networks:
  default:
    name: doclens_network